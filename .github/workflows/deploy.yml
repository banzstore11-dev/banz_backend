name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH Setup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 65002 "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          APP_DIR="/home/${{ secrets.SERVER_USERNAME }}/domains/mistyrose-tiger-867920.hostingersite.com/backend"
          REPO_URL="git@github.com:${{ github.repository }}.git"

          ssh -p 65002 -o StrictHostKeyChecking=no \
          "${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP }}" << EOF

            set -e

            cd "${APP_DIR}"

            if [ ! -d ".git" ]; then
              git clone "${REPO_URL}" .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            composer install --no-dev --optimize-autoloader

            php artisan migrate --force

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            php artisan optimize

          EOF