name: Deploy to Production
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            public/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: SSH Setup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY}}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 65002 "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Copy build artifacts to server
        run: |
          rsync -avz --delete -e "ssh -p 65002" \
          public/build/ \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP }}:/home/${{ secrets.SERVER_USERNAME }}/domains/mistyrose-tiger-867920.hostingersite.com/backend/public/build/

      - name: Deploy to Server
        run: |
          APP_DIR="/home/${{ secrets.SERVER_USERNAME }}/domains/mistyrose-tiger-867920.hostingersite.com/backend"
          REPO_URL="git@github.com:${{ github.repository }}.git"
          ssh -p 65002 -o StrictHostKeyChecking=no \
          "${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP }}" << EOF

            set -e
            cd "${APP_DIR}"
            if [ ! -d ".git" ]; then
              git clone "${REPO_URL}" .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # IMPORTANT: deploy public folder to web root
            rsync -avz --delete "$APP_DIR/public/" "/home/${{ secrets.SERVER_USERNAME }}/public_html/"

            # storage symlink
            ln -sfn "$APP_DIR/storage/app/public" "/home/${{ secrets.SERVER_USERNAME }}/public_html/storage"

          EOF
